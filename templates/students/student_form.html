{% extends "base.html" %}

{% block content %}
<h2>{{ title }}</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="mt-3">
        <button class="btn btn-success me-2">Save</button>
        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
